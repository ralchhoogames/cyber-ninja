<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Ninja: Final Master</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #010103; font-family: monospace; user-select: none; }
        canvas { box-shadow: 0 0 60px rgba(0, 255, 255, 0.2); border: 2px solid #112; border-radius: 8px; }
    </style>
</head>
<body>

<script>
const config = {
    type: Phaser.AUTO, width: 400, height: 700, backgroundColor: '#010103',
    physics: { default: 'arcade', arcade: { debug: false } },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

// --- RPG DATA ---
let upgRadius = parseInt(localStorage.getItem('upg_radius')) || 1; 
let upgCombo = parseInt(localStorage.getItem('upg_combo')) || 1;
let upgDeflect = parseInt(localStorage.getItem('upg_deflect')) || 0;
let totalShards = parseInt(localStorage.getItem('ninja_shards')) || 0;

// --- STATE VARIABLES ---
let player, enemies, bullets, bossGroup, laserWalls;
let particles, pathGraphics, trailGraphics, bgGrid;
let score = 0, currentLevel = 1, combo = 0, enemiesAtStartOfDash = 0;

// BUG FIX: Added isInvulnerable state to prevent unfair deaths
let isDrawing = false, isDashing = false, isInvulnerable = false, isGameOver = false, hasRevived = false;
let currentPath = [];
let currentWeaponColor = 0x00ffff;
let useSprites = false; // Smart tracker for PNG loading

let uiScore, uiShards, uiLevel, gameOverContainer;
const C_BULLET = 0xff3300, C_SHARD = 0x00ff88;

const SKINS = [
    { name: 'CYAN BLADE', color: 0x00ffff, cost: 0 },
    { name: 'PLASMA GOLD', color: 0xffff00, cost: 50 },
    { name: 'VOID PURPLE', color: 0xbd00ff, cost: 100 }
];

// --- SMART ASSET FETCHING SCRIPT ---
function preload() {
    // 1. Try to fetch the local PNG files
    this.load.spritesheet('ninja_sheet', 'ninja.png', { frameWidth: 150, frameHeight: 150 });
    this.load.spritesheet('enemies_sheet', 'enemies.png', { frameWidth: 120, frameHeight: 120 });

    // 2. Error Processing: If CORS blocks the files, catch it!
    this.load.on('loaderror', (fileObj) => {
        console.warn('Security Blocked PNG: ' + fileObj.key + '. Using generated graphics instead.');
        useSprites = false;
    });

    // 3. Success Processing: If files load correctly
    this.load.on('complete', () => {
        if (this.textures.exists('ninja_sheet') && this.textures.exists('enemies_sheet')) {
            useSprites = true;
        }
    });
}

function create() {
    // Generate fallback graphics just in case PNGs failed
    generateStudioAssets(this);

    bgGrid = this.add.grid(200, 350, 400, 1400, 40, 40, 0x010103, 1, 0x050518, 1);

    particles = this.add.particles(0, 0, 'tex_particle', {
        speed: { min: 200, max: 600 }, angle: { min: 0, max: 360 },
        scale: { start: 0.8, end: 0 }, blendMode: 'ADD', lifespan: 400, emitting: false
    });

    pathGraphics = this.add.graphics(); trailGraphics = this.add.graphics();
    enemies = this.physics.add.group(); bullets = this.physics.add.group();
    bossGroup = this.physics.add.group(); laserWalls = this.physics.add.group();

    // Process Animations if PNGs loaded
    if (useSprites) {
        this.anims.create({ key: 'n_idle', frames: this.anims.generateFrameNumbers('ninja_sheet', { start: 0, end: 7 }), frameRate: 10, repeat: -1 });
        this.anims.create({ key: 'n_run', frames: this.anims.generateFrameNumbers('ninja_sheet', { start: 8, end: 15 }), frameRate: 12, repeat: -1 });
        this.anims.create({ key: 'n_attack', frames: this.anims.generateFrameNumbers('ninja_sheet', { start: 16, end: 27 }), frameRate: 24, repeat: 0 });
        this.anims.create({ key: 'e_grunt', frames: this.anims.generateFrameNumbers('enemies_sheet', { start: 0, end: 5 }), frameRate: 10, repeat: -1 });
        this.anims.create({ key: 'e_runner', frames: this.anims.generateFrameNumbers('enemies_sheet', { start: 6, end: 11 }), frameRate: 14, repeat: -1 });
        this.anims.create({ key: 'e_shooter', frames: this.anims.generateFrameNumbers('enemies_sheet', { start: 18, end: 23 }), frameRate: 8, repeat: -1 });
        
        player = this.add.sprite(200, 550, 'ninja_sheet').setScale(0.4);
        player.play('n_idle');
    } else {
        player = this.add.sprite(200, 550, 'tex_player');
    }

    this.physics.add.existing(player);
    player.body.setCircle(15, 15, 15); // Strict, small hitbox

    // UI
    uiScore = this.add.text(20, 20, '0', { font: 'bold 36px Courier', fill: '#ffffff' }).setDepth(10);
    uiScore.setShadow(0, 0, '#00ffff', 10, false, true);
    uiShards = this.add.text(380, 25, '◆' + totalShards, { font: 'bold 20px Courier', fill: '#00ff88' }).setOrigin(1, 0).setDepth(10);
    uiLevel = this.add.text(200, 25, 'STAGE 1', { font: 'bold 16px Courier', fill: '#888899' }).setOrigin(0.5).setDepth(10);
    
    // Show warning if PNGs failed
    if(!useSprites) {
        this.add.text(200, 50, 'CORS SECURITY BLOCK ACTIVE\nUsing Fallback Graphics', { font: '10px Courier', fill: '#ff0000', align: 'center' }).setOrigin(0.5).setDepth(10);
    }

    buildMetaUpgradeTerminal(this);
    startHandcraftedLevel(this);

    // INPUTS
    this.input.on('pointerdown', () => {
        if (isGameOver || isDashing) return;
        isDrawing = true;
        if(useSprites) player.play('n_run', true);
        currentPath = [{ x: player.x, y: player.y }];
        pathGraphics.clear(); pathGraphics.lineStyle(3, currentWeaponColor, 0.9);
        player.setScale(useSprites ? 0.45 : 1.2); 
    });

    this.input.on('pointermove', (pointer) => {
        if (!isDrawing) return;
        let lastPt = currentPath[currentPath.length - 1];
        if (Phaser.Math.Distance.Between(lastPt.x, lastPt.y, pointer.x, pointer.y) > 15) {
            currentPath.push({ x: pointer.x, y: pointer.y });
            pathGraphics.clear(); pathGraphics.lineStyle(4, currentWeaponColor, 0.9);
            pathGraphics.beginPath(); pathGraphics.moveTo(currentPath[0].x, currentPath[0].y);
            currentPath.forEach(pt => pathGraphics.lineTo(pt.x, pt.y));
            pathGraphics.strokePath();
        }
    });

    this.input.on('pointerup', () => {
        if (!isDrawing) return;
        isDrawing = false;
        player.setScale(useSprites ? 0.4 : 1);
        if (currentPath.length > 2) executeInstantFlashStep(this);
        else { 
            pathGraphics.clear(); currentPath = []; 
            if(useSprites) player.play('n_idle', true);
        }
    });

    // BUG FIX: Adjusted overlapping rules for invulnerability
    this.physics.add.overlap(player, enemies, (p, enemy) => {
        if (isDashing || isInvulnerable) sliceEnemyEntity(this, enemy);
        else if (!isDrawing) handleFatalImpact(this, enemy.x, enemy.y);
    });
    this.physics.add.overlap(player, bullets, (p, b) => {
        if (isDashing || isInvulnerable) executeBulletDeflection(this, b);
        else if (!isDrawing) handleFatalImpact(this, b.x, b.y);
    });
    this.physics.add.overlap(player, bossGroup, (p, bSegment) => {
        if (isDashing || isInvulnerable) damageBossCore(this, bSegment);
        else if (!isDrawing) handleFatalImpact(this, bSegment.x, bSegment.y);
    });
    this.physics.add.overlap(player, laserWalls, () => {
        handleFatalImpact(this, player.x, player.y);
    });
}

function update(time, delta) {
    if (isGameOver) return;

    bgGrid.y += 1; if (bgGrid.y > 700) bgGrid.y = 350;

    laserWalls.getChildren().forEach(l => { if(l.rotSpeed) l.angle += l.rotSpeed; });

    if (!isDrawing && !isDashing) {
        enemies.getChildren().forEach(e => {
            this.physics.moveToObject(e, player, e.speedData);
            if(useSprites) e.flipX = e.body.velocity.x < 0;
            else e.rotation = Phaser.Math.Angle.Between(e.x, e.y, player.x, player.y);

            if (e.eType === 'SHOOTER' && time > e.nextFire) {
                e.nextFire = time + 1800;
                fireLaserProjectile(this, e.x, e.y, player.x, player.y, 200);
            }
        });

        bossGroup.getChildren().forEach(b => {
            b.angle += 3;
            if (time > b.nextFire) {
                b.nextFire = time + 1200;
                for(let angle=0; angle<360; angle+=45) {
                    let rad = Phaser.Math.DegToRad(angle);
                    fireLaserProjectile(this, b.x, b.y, b.x + Math.cos(rad)*100, b.y + Math.sin(rad)*100, 150);
                }
            }
        });

        // BUG FIX: Aggressive Garbage Collection to prevent Lag
        bullets.getChildren().forEach(b => {
            if (b.x < -50 || b.x > 450 || b.y < -50 || b.y > 750) b.destroy();
        });
    } else {
        enemies.getChildren().forEach(e => e.body.setVelocity(0, 0));
        bullets.getChildren().forEach(b => b.body.setVelocity(0, 0));
        bossGroup.getChildren().forEach(b => b.body.setVelocity(0, 0));
    }
}

// --- FALLBACK GRAPHICS GENERATOR ---
function generateStudioAssets(scene) {
    let g = scene.make.graphics({x:0, y:0, add:false});
    g.fillStyle(0x222233); g.fillCircle(16, 16, 16); g.fillStyle(0xffffff); g.fillRoundedRect(8, 10, 20, 8, 4); g.generateTexture('tex_player', 32, 32); g.clear();
    g.fillStyle(0xff0055); g.fillCircle(16, 16, 14); g.fillStyle(0x000000); g.fillCircle(16, 16, 8); g.fillStyle(0xffffff); g.fillCircle(16, 16, 4); g.generateTexture('tex_grunt', 32, 32); g.clear();
    g.fillStyle(0xffff00); g.fillTriangle(0, 8, 24, 16, 0, 24); g.generateTexture('tex_runner', 24, 32); g.clear();
    g.fillStyle(0xbd00ff); g.fillRect(4, 4, 24, 24); g.fillStyle(0xffffff); g.fillRect(12, 12, 8, 8); g.generateTexture('tex_shooter', 32, 32); g.clear();
    g.lineStyle(6, 0xff0055); g.strokeCircle(48, 48, 40); g.fillStyle(0x222233); g.fillCircle(48, 48, 30); g.fillStyle(0xffffff); g.fillCircle(48, 48, 15); g.generateTexture('tex_boss', 96, 96); g.clear();
    g.fillStyle(0xffffff); g.fillRect(0, 0, 8, 8); g.generateTexture('tex_particle', 8, 8);
}

// --- BUG FIX: INSTANT FLASH STEP WITH SAFETY TIMERS ---
function executeInstantFlashStep(scene) {
    isDashing = true; 
    isInvulnerable = true; // Protect player during calculation
    combo = 0;
    enemiesAtStartOfDash = enemies.countActive() + bossGroup.countActive();
    pathGraphics.clear();
    
    if(useSprites) player.play('n_attack', true);

    trailGraphics.clear();
    let thickness = 16 + (upgRadius * 5);
    trailGraphics.lineStyle(thickness, currentWeaponColor, 1);
    trailGraphics.beginPath(); trailGraphics.moveTo(currentPath[0].x, currentPath[0].y);
    currentPath.forEach(pt => trailGraphics.lineTo(pt.x, pt.y));
    trailGraphics.strokePath();

    currentPath.forEach(pt => {
        player.setPosition(pt.x, pt.y);
        if(isGameOver) return; 
        scene.physics.overlap(player, laserWalls);
        scene.physics.overlap(player, enemies);
        scene.physics.overlap(player, bullets);
        scene.physics.overlap(player, bossGroup);
    });

    currentPath = [];

    // The Fix: Dashing is false, but Invulnerable stays true for an extra 100ms
    scene.time.delayedCall(50, () => { isDashing = false; });
    scene.time.delayedCall(150, () => { 
        isInvulnerable = false; 
        if(!isGameOver && useSprites) player.play('n_idle', true);
    });

    scene.tweens.add({ targets: trailGraphics, alpha: 0, duration: 150, onComplete: () => { trailGraphics.clear(); trailGraphics.setAlpha(1); } });
}

function sliceEnemyEntity(scene, enemy) {
    if(!enemy.active) return; // Prevent double-kills
    
    if (enemy.eType === 'SHIELD' && !enemy.isBroken) {
        enemy.isBroken = true; 
        if(useSprites) enemy.clearTint(); else enemy.setTint(0xffffff);
        spawnFloatingText(scene, enemy.x, enemy.y, 'SHIELD BREAK', '#ffffff');
        return;
    }

    combo++;
    let points = Math.floor((100 * combo) * (1 + (upgCombo * 0.2)));
    score += points; uiScore.setText(score);
    
    scene.physics.world.pause(); setTimeout(() => { scene.physics.world.resume(); }, 30);

    particles.setParticleTint(0xffffff); particles.emitParticleAt(enemy.x, enemy.y, 30);
    scene.cameras.main.shake(60, 0.02);
    
    triggerFloatingComboPhrase(scene, enemy.x, enemy.y, points);
    spawnShardBankPayout(scene, enemy.x, enemy.y, 1);
    enemy.destroy();
    
    evaluateLevelCompletion(scene);
}

function damageBossCore(scene, segment) {
    if(!segment.active) return;
    segment.hp -= 1;
    scene.cameras.main.shake(80, 0.03);
    particles.setParticleTint(0xffffff); particles.emitParticleAt(segment.x, segment.y, 20);

    scene.physics.world.pause(); setTimeout(() => { scene.physics.world.resume(); }, 40);

    if (segment.hp <= 0) {
        combo += 5; score += 5000; uiScore.setText(score);
        spawnFloatingText(scene, segment.x, segment.y, 'CORE DESTROYED', '#ffff00');
        spawnShardBankPayout(scene, segment.x, segment.y, 15);
        segment.destroy(); evaluateLevelCompletion(scene);
    } else {
        spawnFloatingText(scene, segment.x, segment.y, `ARMOR: ${segment.hp}`, '#ff0055');
    }
}

function executeBulletDeflection(scene, bullet) {
    bullet.destroy(); score += 50; uiScore.setText(score);
    particles.setParticleTint(C_BULLET); particles.emitParticleAt(bullet.x, bullet.y, 10);
    if (upgDeflect > 0 && Phaser.Math.Between(1, 100) <= (upgDeflect * 15)) spawnShardBankPayout(scene, bullet.x, bullet.y, 1);
}

function startHandcraftedLevel(scene) {
    uiLevel.setText(`STAGE ${currentLevel}`);
    enemies.clear(true, true); bullets.clear(true, true); bossGroup.clear(true, true); laserWalls.clear(true, true);

    if (currentLevel === 1) {
        spawnTarget(scene, 100, 200, 'GRUNT', 40); spawnTarget(scene, 300, 200, 'GRUNT', 40);
        spawnTarget(scene, 200, 350, 'GRUNT', 40);
    } else if (currentLevel === 2) {
        spawnTarget(scene, 100, 200, 'GRUNT', 50); spawnTarget(scene, 300, 200, 'GRUNT', 50);
        spawnTarget(scene, 200, 150, 'RUNNER', 90);
    } else if (currentLevel === 3) {
        spawnStaticLaser(scene, 200, 250, 300, 8); 
        spawnTarget(scene, 100, 150, 'GRUNT', 40); spawnTarget(scene, 300, 150, 'GRUNT', 40);
        spawnTarget(scene, 200, 350, 'RUNNER', 100);
    } else if (currentLevel === 4) {
        spawnTarget(scene, 100, 150, 'SHOOTER', 30); spawnTarget(scene, 300, 150, 'SHOOTER', 30);
    } else if (currentLevel === 5) {
        let b = scene.add.sprite(200, 200, useSprites ? 'enemies_sheet' : 'tex_boss');
        if(useSprites) { b.setScale(1.2); b.setFrame(18); }
        scene.physics.add.existing(b);
        b.body.setCircle(35, 10, 10); b.hp = 8; b.nextFire = scene.time.now + 1000; bossGroup.add(b);
        spawnFloatingText(scene, 200, 110, '!!! CORE SENTINEL !!!', '#ff0055');
    } else {
        if(Phaser.Math.Between(0,100) > 50) spawnRotatingLaser(scene, 200, 350, 200, 8, 1.5);
        else spawnStaticLaser(scene, 200, Phaser.Math.Between(200, 400), 250, 8);

        let total = Math.min(18, 3 + Math.floor(currentLevel * 0.6));
        for (let i = 0; i < total; i++) {
            let rx = Phaser.Math.Between(40, 360), ry = Phaser.Math.Between(100, 500);
            let typeChance = Phaser.Math.Between(0, 100);
            if (typeChance < 30) spawnTarget(scene, rx, ry, 'RUNNER', 100 + currentLevel);
            else if (typeChance > 80) spawnTarget(scene, rx, ry, 'SHOOTER', 35);
            else spawnTarget(scene, rx, ry, 'GRUNT', 60 + currentLevel);
        }
    }
}

function spawnTarget(scene, x, y, type, speed) {
    let e;
    if(useSprites) {
        e = scene.add.sprite(x, y, 'enemies_sheet').setScale(0.45);
        if(type === 'GRUNT') e.play('e_grunt');
        if(type === 'RUNNER') e.play('e_runner');
        if(type === 'SHOOTER') e.play('e_shooter');
        if(type === 'SHIELD') { e.play('e_grunt'); e.setTint(0x4444ff); }
    } else {
        e = scene.add.sprite(x, y, type==='GRUNT'?'tex_grunt':type==='RUNNER'?'tex_runner':'tex_shooter');
        if(type === 'SHIELD') { e.setTexture('tex_grunt'); e.setTint(0x00ffff); }
    }
    
    scene.physics.add.existing(e); e.body.setCircle(16, 5, 5);
    if(type === 'SHIELD') e.isBroken = false;
    if(type === 'SHOOTER') e.nextFire = scene.time.now + 1000;
    
    e.eType = type; e.speedData = speed; enemies.add(e);
}

function fireLaserProjectile(scene, sx, sy, tx, ty, speed) {
    let b = scene.add.rectangle(sx, sy, 8, 8, C_BULLET); scene.physics.add.existing(b); scene.physics.moveTo(b, tx, ty, speed); bullets.add(b);
}
function spawnStaticLaser(scene, x, y, w, h) {
    let l = scene.add.rectangle(x, y, w, h, 0xff0000).setAlpha(0.7);
    scene.physics.add.existing(l); lasers.add(l); laserWalls.add(l);
}
function spawnRotatingLaser(scene, x, y, w, h, speed) {
    let l = scene.add.rectangle(x, y, w, h, 0xff0000).setAlpha(0.7);
    scene.physics.add.existing(l); l.rotSpeed = speed; laserWalls.add(l);
}

function evaluateLevelCompletion(scene) {
    if (enemies.countActive() === 0 && bossGroup.countActive() === 0 && !isGameOver) {
        if (combo === enemiesAtStartOfDash) {
            score += 1500; uiScore.setText(score);
            spawnFloatingText(scene, 200, 320, 'PERFECT ONE SLASH\n+1500', '#00ffff');
        }
        currentLevel++;
        scene.time.delayedCall(800, () => startHandcraftedLevel(scene));
    }
}

function spawnShardBankPayout(scene, x, y, count) {
    for (let i = 0; i < count; i++) {
        let s = scene.add.rectangle(x, y, 6, 6, C_SHARD);
        scene.tweens.add({ targets: s, x: x + Phaser.Math.Between(-30, 30), y: y + Phaser.Math.Between(-30, 30), duration: 150, onComplete: () => {
            scene.tweens.add({ targets: s, x: 360, y: 35, duration: 400, ease: 'Back.easeIn', onComplete: () => {
                totalShards++; localStorage.setItem('ninja_shards', totalShards); uiShards.setText('◆' + totalShards); s.destroy();
            }});
        }});
    }
}

function triggerFloatingComboPhrase(scene, x, y, points) {
    let phrase = `+${points}`;
    if (combo >= 12) phrase = `LEGENDARY!\n+${points}`; else if (combo >= 8) phrase = `AWESOME!\n+${points}`; else if (combo >= 4) phrase = `GREAT!\n+${points}`;
    spawnFloatingText(scene, x, y, phrase, '#ffff00');
}
function spawnFloatingText(scene, x, y, msg, color) {
    let t = scene.add.text(x, y, msg, { font: 'bold 14px Courier', fill: color, align: 'center' }).setOrigin(0.5).setDepth(15);
    t.setShadow(0, 0, color, 8, false, true);
    scene.tweens.add({ targets: t, y: y - 40, alpha: 0, duration: 700, onComplete: () => t.destroy() });
}

function handleFatalImpact(scene, x, y) {
    if(isInvulnerable) return; // Ignore if player just dashed
    isGameOver = true; player.setVisible(false);
    particles.setParticleTint(currentWeaponColor); particles.emitParticleAt(player.x, player.y, 40);
    scene.cameras.main.shake(250, 0.05);

    updateTerminalDisplayLayout();
    scene.time.delayedCall(500, () => { gameOverContainer.setVisible(true); });
}

function buildMetaUpgradeTerminal(scene) {
    gameOverContainer = scene.add.container(200, 350).setDepth(20).setVisible(false);
    let bg = scene.add.rectangle(0, 0, 340, 560, 0x010106, 0.98).setStrokeStyle(2, 0xff0055);
    let title = scene.add.text(0, -240, 'SYSTEM OVERRIDE', { font: 'bold 24px Courier', fill: '#ff0055' }).setOrigin(0.5);
    let stats = scene.add.text(0, -190, '', { font: 'bold 16px Courier', fill: '#ffffff', align: 'center' }).setOrigin(0.5).setName('statsText');
    gameOverContainer.add([bg, title, stats]);

    let upgData = [
        { name: 'SLASH RADIUS', key: 'radius', get: () => upgRadius, set: (v) => upgRadius = v },
        { name: 'COMBO BOOST', key: 'combo', get: () => upgCombo, set: (v) => upgCombo = v },
        { name: 'DEFLECT INCOME', key: 'deflect', get: () => upgDeflect, set: (v) => upgDeflect = v }
    ];

    upgData.forEach((u, idx) => {
        let btnY = -80 + (idx * 60);
        let btn = scene.add.rectangle(0, btnY, 280, 45, 0x0a0a20).setStrokeStyle(1, 0x333366).setInteractive();
        let txt = scene.add.text(0, btnY, '', { font: 'bold 12px Courier', fill: '#fff' }).setOrigin(0.5);
        btn.on('pointerdown', () => {
            let currentLvl = u.get(); if (currentLvl >= 5) return;
            let cost = (currentLvl + 1) * 35;
            if (totalShards >= cost) {
                totalShards -= cost; u.set(currentLvl + 1);
                localStorage.setItem('ninja_shards', totalShards); localStorage.setItem(`upg_${u.key}`, u.get());
                uiShards.setText('◆' + totalShards); updateTerminalDisplayLayout();
            }
        });
        gameOverContainer.add([btn, txt]); u.btnRef = btn; u.txtRef = txt;
    });
    gameOverContainer.upgData = upgData;

    let adBtn = scene.add.rectangle(0, 130, 280, 45, 0x150a0a).setStrokeStyle(1, 0xff5500).setInteractive();
    let adTxt = scene.add.text(0, 130, '🎬 WATCH AD: FREE REVIVE', { font: 'bold 12px Courier', fill: '#ff5500' }).setOrigin(0.5);
    adBtn.on('pointerdown', () => {
        if (hasRevived) return;
        hasRevived = true; isGameOver = false; isInvulnerable = true;
        player.setPosition(200, 600).setVisible(true);
        if(useSprites) player.play('n_idle', true);
        scene.time.delayedCall(1000, () => { isInvulnerable = false; }); // Safe revive
        gameOverContainer.setVisible(false); spawnFloatingText(scene, 200, 350, 'SYSTEM RESTORED', '#00ffff');
    });
    gameOverContainer.add([adBtn, adTxt]); gameOverContainer.adBtn = adBtn; gameOverContainer.adTxt = adTxt;

    let retryBtn = scene.add.rectangle(0, 210, 280, 55, 0x00ffff, 0.1).setStrokeStyle(2, 0x00ffff).setInteractive();
    let retryTxt = scene.add.text(0, 210, '> REBOOT CORE <', { font: 'bold 18px Courier', fill: '#00ffff' }).setOrigin(0.5);
    scene.tweens.add({ targets: [retryBtn, retryTxt], alpha: { from: 1, to: 0.7 }, scale: { from: 1, to: 1.05 }, yoyo: true, repeat: -1, duration: 800, ease: 'Sine.easeInOut' });
    retryBtn.on('pointerdown', () => {
        isGameOver = false; score = 0; currentLevel = 1; hasRevived = false; isInvulnerable = true;
        uiScore.setText('0');
        player.setPosition(200, 600).setVisible(true);
        if(useSprites) player.play('n_idle', true);
        scene.time.delayedCall(1000, () => { isInvulnerable = false; });
        gameOverContainer.setVisible(false); startHandcraftedLevel(scene);
    });
    gameOverContainer.add([retryBtn, retryTxt]);
}

function updateTerminalDisplayLayout() {
    gameOverContainer.getByName('statsText').setText(`STAGE REACHED: ${currentLevel}\nTOTAL DATA: ${score}`);
    gameOverContainer.upgData.forEach(u => {
        let lvl = u.get();
        if (lvl >= 5) { u.txtRef.setText(`${u.name}: MAX LEVEL`); u.btnRef.setStrokeStyle(2, 0x00ff88); } 
        else { let cost = (lvl + 1) * 35; u.txtRef.setText(`UPGRADE ${u.name} (LVL ${lvl}/5)\nCOST: ◆${cost}`); u.btnRef.setStrokeStyle(1, totalShards >= cost ? 0x00ffff : 0x442222); }
    });
    if (hasRevived) { gameOverContainer.adBtn.setAlpha(0.2).disableInteractive(); gameOverContainer.adTxt.setText('REVIVE UNAVAILABLE'); } 
    else { gameOverContainer.adBtn.setAlpha(1).setInteractive(); gameOverContainer.adTxt.setText('🎬 WATCH AD: FREE REVIVE'); }
}
</script>
</body>
</html>
