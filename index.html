<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Ninja: Infinite Survivor</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #010103; font-family: monospace; user-select: none; }
        canvas { box-shadow: 0 0 60px rgba(0, 255, 255, 0.2); border: 2px solid #112; border-radius: 8px; }
    </style>
</head>
<body>

<script>
// --- AUDIO SYSTEM ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination); const now = audioCtx.currentTime;
    if(type === 'slash') { osc.type = 'triangle'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.1); gain.gain.setValueAtTime(0.5, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1); osc.start(now); osc.stop(now + 0.1); }
    else if (type === 'hit') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(40, now + 0.15); gain.gain.setValueAtTime(0.4, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15); osc.start(now); osc.stop(now + 0.15); }
    else if (type === 'item') { osc.type = 'sine'; osc.frequency.setValueAtTime(1200, now); gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1); osc.start(now); osc.stop(now + 0.1); }
    else if (type === 'levelup') { osc.type = 'square'; osc.frequency.setValueAtTime(400, now); osc.frequency.setValueAtTime(600, now+0.1); osc.frequency.setValueAtTime(800, now+0.2); gain.gain.setValueAtTime(0.3, now); gain.gain.linearRampToValueAtTime(0, now + 0.5); osc.start(now); osc.stop(now + 0.5); }
    else if (type === 'crash') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, now); osc.frequency.linearRampToValueAtTime(10, now + 0.5); gain.gain.setValueAtTime(0.6, now); gain.gain.linearRampToValueAtTime(0, now + 0.5); osc.start(now); osc.stop(now + 0.5); }
}

const config = {
    type: Phaser.AUTO, width: 400, height: 700, backgroundColor: '#010103',
    physics: { default: 'arcade', arcade: { debug: false } },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

// --- GLOBAL STATE ---
let STATE = 'PLAYING'; 
let totalGems = parseInt(localStorage.getItem('ninja_gems')) || 0;

// --- IN-RUN STATS ---
let score = 0;
let runLevel = 1;
let currentExp = 0;
let maxExp = 5;
let waveTimer = 0;
let waveDifficulty = 1;
let isDrawing = false, isDashing = false, isInvulnerable = false;
let currentPath = [];
let activePowerups = { magnet: 0, shield: false };

// Upgrades
let statRadius = 1;
let statCombo = 1;

let player, enemies, bullets, bosses, items;
let pathGraphics, trailGraphics, customBg;
let uiScore, uiGems, uiExpBar, uiExpFill, btnPause;
let pauseMenu, levelUpMenu, gameOverMenu;

let useSprites = false;
let useBg = false;

function preload() {
    // MODIFIED: Updated to ninja2.png and bg2.png
    this.load.image('ninja', 'ninja2.png');
    this.load.image('tier1', 'tier1.png');
    this.load.image('tier2', 'tier2.png');
    this.load.image('bosses', 'bosses.png');
    this.load.image('items', 'items.png');
    this.load.image('bg', 'bg2.png');

    this.load.on('loaderror', (fileObj) => {
        if(fileObj.key === 'bg') useBg = false;
        else useSprites = false;
    });

    this.load.on('complete', () => {
        if (this.textures.exists('ninja') && this.textures.exists('tier1')) useSprites = true;
        if (this.textures.exists('bg')) useBg = true;
    });
}

function create() {
    // 1. ENVIRONMENT
    if(useBg) {
        customBg = this.add.tileSprite(200, 350, 400, 700, 'bg');
    } else {
        customBg = this.add.grid(200, 350, 400, 1400, 40, 40, 0x010103, 1, 0x050518, 1);
    }

    pathGraphics = this.add.graphics().setDepth(5); 
    trailGraphics = this.add.graphics().setDepth(5);
    
    enemies = this.physics.add.group(); 
    bullets = this.physics.add.group();
    bosses = this.physics.add.group(); 
    items = this.physics.add.group();

    // 2. PLAYER
    player = this.add.sprite(200, 550, useSprites ? 'ninja' : '');
    if(useSprites) {
        player.setCrop(0, 0, player.width/3, player.height); 
        // MODIFIED: Scaled up to 110
        player.displayHeight = 110; player.scaleX = player.scaleY;
    } else {
        player = this.add.rectangle(200, 550, 30, 30, 0x00ffff);
    }
    this.physics.add.existing(player);
    player.body.setCircle(18); // Scaled hitbox
    player.setDepth(10);

    // 3. UI
    uiScore = this.add.text(10, 10, 'SCORE: 0', { font: 'bold 20px Courier', fill: '#fff' }).setDepth(20);
    uiGems = this.add.text(10, 35, '💎 ' + totalGems, { font: 'bold 20px Courier', fill: '#ff00aa' }).setDepth(20);
    
    uiExpBar = this.add.rectangle(200, 680, 380, 15, 0x222233).setDepth(20);
    uiExpFill = this.add.rectangle(10, 680, 0, 15, 0x0088ff).setOrigin(0, 0.5).setDepth(21);

    btnPause = this.add.text(380, 15, '⏸', { font: '24px Arial', fill: '#fff' }).setOrigin(1, 0).setInteractive().setDepth(20);
    btnPause.on('pointerdown', () => { if(STATE === 'PLAYING') triggerPause(this); });

    buildMenus(this);

    // 4. INPUTS
    this.input.on('pointerdown', () => {
        if (STATE !== 'PLAYING' || isDashing) return;
        if(audioCtx.state === 'suspended') audioCtx.resume();
        
        isDrawing = true;
        currentPath = [{ x: player.x, y: player.y }];
        pathGraphics.clear(); pathGraphics.lineStyle(4, 0x00ffff, 0.9);
        if(useSprites) player.setCrop(player.width/3, 0, player.width/3, player.height); 
    });

    this.input.on('pointermove', (pointer) => {
        if (!isDrawing) return;
        let lastPt = currentPath[currentPath.length - 1];
        if (Phaser.Math.Distance.Between(lastPt.x, lastPt.y, pointer.x, pointer.y) > 15) {
            currentPath.push({ x: pointer.x, y: pointer.y });
            pathGraphics.clear(); pathGraphics.lineStyle(4, 0x00ffff, 0.9);
            pathGraphics.beginPath(); pathGraphics.moveTo(currentPath[0].x, currentPath[0].y);
            currentPath.forEach(pt => pathGraphics.lineTo(pt.x, pt.y));
            pathGraphics.strokePath();
        }
    });

    this.input.on('pointerup', () => {
        if (!isDrawing) return;
        isDrawing = false;
        if (currentPath.length > 2) executeSlash(this);
        else { 
            pathGraphics.clear(); currentPath = []; 
            if(useSprites) player.setCrop(0, 0, player.width/3, player.height);
        }
    });

    // 5. FATAL COLLISIONS
    this.physics.add.overlap(player, enemies, (p, e) => { if (STATE === 'PLAYING' && !isDashing && !isInvulnerable && e.active) handleFatalImpact(this); });
    this.physics.add.overlap(player, bullets, (p, b) => { if (STATE === 'PLAYING' && !isDashing && !isInvulnerable && b.active) handleFatalImpact(this); });
    this.physics.add.overlap(player, bosses, (p, b) => { if (STATE === 'PLAYING' && !isDashing && !isInvulnerable && b.active) handleFatalImpact(this); });
}

function update(time, delta) {
    if (STATE !== 'PLAYING') {
        enemies.getChildren().forEach(e => e.body.setVelocity(0, 0));
        bullets.getChildren().forEach(b => b.body.setVelocity(0, 0));
        bosses.getChildren().forEach(b => b.body.setVelocity(0, 0));
        items.getChildren().forEach(i => i.body.setVelocity(0, 0));
        return; 
    }

    if(useBg && customBg.tilePositionY !== undefined) customBg.tilePositionY -= (2 + (waveDifficulty * 0.5));
    else { customBg.y += 2; if (customBg.y > 700) customBg.y = 350; }

    // AI DIRECTOR 
    waveTimer += delta;
    if (waveTimer > 2000 - (waveDifficulty * 40)) {
        waveTimer = 0;
        spawnEnemyDirector(this);
    }

    // Magnet Powerup Logic
    if (activePowerups.magnet > time) {
        items.getChildren().forEach(item => { this.physics.moveToObject(item, player, 450); });
    } else {
        items.getChildren().forEach(item => { item.body.setVelocity(0, 60); }); 
    }

    if (!isDrawing && !isDashing) {
        enemies.getChildren().forEach(e => {
            this.physics.moveToObject(e, player, e.speedData);
            if(useSprites) e.flipX = e.body.velocity.x > 0;
            
            if (e.eType === 'SHOOTER' && time > e.nextFire) {
                e.nextFire = time + 2000;
                fireProjectile(this, e.x, e.y, player.x, player.y, 160 + (waveDifficulty*5));
            }
        });

        bosses.getChildren().forEach(b => {
            b.x += Math.sin(time/500) * 2; 
            if (time > b.nextFire) {
                b.nextFire = time + 1000 - (waveDifficulty*15);
                for(let angle=0; angle<360; angle+=45) {
                    let rad = Phaser.Math.DegToRad(angle);
                    fireProjectile(this, b.x, b.y, b.x + Math.cos(rad)*100, b.y + Math.sin(rad)*100, 160);
                }
            }
        });

        bullets.getChildren().forEach(b => { if (b.y > 750 || b.x < -50 || b.x > 450) { b.active=false; b.destroy(); } });
        items.getChildren().forEach(i => { if (i.y > 750) { i.active=false; i.destroy(); } });
    }
}

// --- AI DIRECTOR SPAWN LOGIC ---
function spawnEnemyDirector(scene) {
    waveDifficulty = 1 + Math.floor(score / 5000);
    
    if (Math.random() < 0.05 && bosses.countActive() === 0 && waveDifficulty >= 2) {
        spawnBoss(scene);
        return;
    }

    let x = Phaser.Math.Between(40, 360);
    let y = Phaser.Math.Between(-50, 50);
    let r = Math.random();

    if (waveDifficulty > 3 && r < 0.2) spawnActor(scene, x, y, 'SHOOTER', 45);
    else if (waveDifficulty > 2 && r < 0.4) spawnActor(scene, x, y, 'SHIELD', 55);
    else if (r < 0.5) spawnActor(scene, x, y, 'RUNNER', 120 + (waveDifficulty*8));
    else spawnActor(scene, x, y, 'GRUNT', 70 + (waveDifficulty*5));
}

function spawnActor(scene, x, y, type, speed) {
    let sheet = (type==='SHIELD'||type==='SHOOTER') ? 'tier2' : 'tier1';
    let e = scene.add.sprite(x, y, useSprites ? sheet : '');
    if(useSprites) {
        if(type === 'GRUNT') e.setCrop(0,0,e.width/2,e.height);
        if(type === 'RUNNER') e.setCrop(e.width/2,0,e.width/2,e.height);
        if(type === 'SHIELD') { e.setCrop(0,0,e.width/2,e.height); e.setTint(0x88ffff); }
        if(type === 'SHOOTER') e.setCrop(e.width/2,0,e.width/2,e.height);
        // MODIFIED: Scaled up enemies
        e.displayHeight = 85; e.scaleX = e.scaleY;
    } else {
        e = scene.add.rectangle(x, y, 20, 20, 0xff0055);
    }
    
    scene.physics.add.existing(e); e.body.setCircle(20); // Scaled hitbox
    if(type === 'SHIELD') e.isBroken = false;
    if(type === 'SHOOTER') e.nextFire = scene.time.now + 1000;
    
    e.eType = type; e.speedData = speed; enemies.add(e);
}

function spawnBoss(scene) {
    let b = scene.add.sprite(200, -50, useSprites ? 'bosses' : '');
    if(useSprites) {
        let frame = Phaser.Math.Between(0, 2);
        b.setCrop(frame*(b.width/3), 0, b.width/3, b.height);
        // MODIFIED: Scaled up boss massively
        b.displayHeight = 160; b.scaleX = b.scaleY;
    } else {
        b = scene.add.circle(200, 100, 50, 0xff0000);
    }
    scene.physics.add.existing(b); b.body.setCircle(55); // Scaled hitbox
    
    // Smooth entry
    scene.tweens.add({ targets: b, y: 150, duration: 2000, ease: 'Power2' });
    
    b.hp = 12 + (waveDifficulty * 6); b.nextFire = scene.time.now + 2000; bosses.add(b);
    scene.cameras.main.flash(200, 255, 0, 0); 
}

function fireProjectile(scene, sx, sy, tx, ty, speed) {
    let b = scene.add.rectangle(sx, sy, 10, 10, C_BULLET); scene.physics.add.existing(b); scene.physics.moveTo(b, tx, ty, speed); bullets.add(b);
}

// --- MATH COMBAT ENGINE ---
function executeSlash(scene) {
    isDashing = true; isInvulnerable = true; 
    playSound('slash');
    
    if(useSprites) player.setCrop((player.width/3)*2, 0, player.width/3, player.height); 
    
    pathGraphics.clear(); trailGraphics.clear();
    let thickness = 16 + (statRadius * 6);
    trailGraphics.lineStyle(thickness, 0x00ffff, 1);
    trailGraphics.beginPath(); trailGraphics.moveTo(currentPath[0].x, currentPath[0].y);
    currentPath.forEach(pt => trailGraphics.lineTo(pt.x, pt.y)); trailGraphics.strokePath();

    // MODIFIED: Increased intersection radius to match new large visuals
    let hitRadius = 35 + (statRadius * 5); 

    for (let i = 0; i < currentPath.length - 1; i++) {
        let line = new Phaser.Geom.Line(currentPath[i].x, currentPath[i].y, currentPath[i+1].x, currentPath[i+1].y);

        enemies.getChildren().forEach(enemy => {
            if(!enemy.active) return;
            if (Phaser.Geom.Intersects.LineToCircle(line, new Phaser.Geom.Circle(enemy.x, enemy.y, hitRadius + 15))) killEnemy(scene, enemy);
        });

        bullets.getChildren().forEach(bullet => {
            if(!bullet.active) return;
            if (Phaser.Geom.Intersects.LineToCircle(line, new Phaser.Geom.Circle(bullet.x, bullet.y, hitRadius + 10))) {
                bullet.active = false; bullet.destroy(); score += 50; uiScore.setText('SCORE: ' + score); playSound('item');
            }
        });

        bosses.getChildren().forEach(boss => {
            if(!boss.active) return;
            if (Phaser.Geom.Intersects.LineToCircle(line, new Phaser.Geom.Circle(boss.x, boss.y, hitRadius + 50))) damageBoss(scene, boss);
        });

        items.getChildren().forEach(item => {
            if(!item.active) return;
            if (Phaser.Geom.Intersects.LineToCircle(line, new Phaser.Geom.Circle(item.x, item.y, hitRadius + 20))) collectItem(scene, item);
        });
    }

    let lastPoint = currentPath[currentPath.length - 1];
    if (useSprites) player.flipX = lastPoint.x < player.x;
    player.setPosition(lastPoint.x, lastPoint.y);
    currentPath = [];

    scene.time.delayedCall(50, () => { 
        isDashing = false; 
        if(STATE === 'PLAYING' && useSprites) player.setCrop(0, 0, player.width/3, player.height); 
    });
    scene.time.delayedCall(250, () => { isInvulnerable = false; });
    scene.tweens.add({ targets: trailGraphics, alpha: 0, duration: 150, onComplete: () => { trailGraphics.clear(); trailGraphics.setAlpha(1); } });
}

function killEnemy(scene, enemy) {
    if(!enemy.active) return;
    if (enemy.eType === 'SHIELD' && !enemy.isBroken) { enemy.isBroken = true; enemy.clearTint(); return; }
    
    enemy.active = false; 
    score += Math.floor(100 * statCombo); uiScore.setText('SCORE: ' + score); playSound('hit');
    scene.cameras.main.shake(40, 0.01);
    
    spawnItem(scene, enemy.x, enemy.y);
    enemy.destroy();
}

function damageBoss(scene, boss) {
    if(!boss.active || boss.invuln) return;
    boss.hp -= statCombo; boss.invuln = true; scene.time.delayedCall(100, () => boss.invuln = false); 
    scene.cameras.main.shake(80, 0.02); playSound('hit');

    if (boss.hp <= 0) {
        boss.active = false; score += 5000; uiScore.setText('SCORE: ' + score);
        for(let i=0; i<10; i++) spawnItem(scene, boss.x + Phaser.Math.Between(-40,40), boss.y + Phaser.Math.Between(-40,40), true);
        boss.destroy();
    }
}

// --- ECONOMY & LEVELING ---
function spawnItem(scene, x, y, forceGem = false) {
    let r = Math.random();
    let type = 'EXP'; let frame = 0;
    
    if (forceGem || r > 0.95) { type = 'GEM'; frame = 1; }
    else if (r > 0.92) { type = 'MAGNET'; frame = 2; }
    else if (r > 0.89) { type = 'SHIELD'; frame = 3; }

    let i = scene.add.sprite(x, y, useSprites ? 'items' : '');
    if(useSprites) { 
        i.setCrop(frame*(i.width/5), 0, i.width/5, i.height); 
        // MODIFIED: Scaled up items
        i.displayHeight = 35; i.scaleX = i.scaleY; 
    } else { 
        i = scene.add.rectangle(x, y, 15, 15, type==='EXP'?0x0088ff:0xff00aa); 
    }
    
    scene.physics.add.existing(i); i.body.setCircle(15); i.iType = type; items.add(i);
}

function collectItem(scene, item) {
    item.active = false; playSound('item');
    if (item.iType === 'EXP') {
        currentExp++;
        let fillWidth = (currentExp / maxExp) * 380;
        scene.tweens.add({ targets: uiExpFill, width: fillWidth, duration: 100 });
        if (currentExp >= maxExp) triggerLevelUp(scene);
    } else if (item.iType === 'GEM') {
        totalGems++; localStorage.setItem('ninja_gems', totalGems); uiGems.setText('💎 ' + totalGems);
    } else if (item.iType === 'MAGNET') {
        activePowerups.magnet = scene.time.now + 8000; 
    } else if (item.iType === 'SHIELD') {
        activePowerups.shield = true; player.setTint(0x00ffff);
    }
    item.destroy();
}

function triggerLevelUp(scene) {
    STATE = 'LEVELUP'; playSound('levelup');
    levelUpMenu.setVisible(true);
}

// --- STATE MACHINES & MENUS ---
function handleFatalImpact(scene) {
    if(activePowerups.shield) {
        activePowerups.shield = false; player.clearTint();
        isInvulnerable = true; scene.time.delayedCall(1500, () => isInvulnerable = false);
        scene.cameras.main.flash(200, 0, 255, 255); playSound('slash'); return;
    }
    STATE = 'GAMEOVER'; playSound('crash'); player.setVisible(false); scene.cameras.main.shake(300, 0.05);
    gameOverMenu.getByName('stats').setText(`WAVE LIVED: ${waveDifficulty}\nSCORE: ${score}`);
    scene.time.delayedCall(800, () => gameOverMenu.setVisible(true));
}

function triggerPause(scene) {
    STATE = 'PAUSED'; pauseMenu.setVisible(true);
}

function buildMenus(scene) {
    // 1. PAUSE MENU
    pauseMenu = scene.add.container(200, 350).setDepth(100).setVisible(false);
    let pBg = scene.add.rectangle(0, 0, 300, 200, 0x000000, 0.9).setStrokeStyle(2, 0xffffff);
    let pTxt = scene.add.text(0, -50, 'PAUSED', { font: 'bold 24px Courier', fill: '#fff' }).setOrigin(0.5);
    let pBtn = scene.add.text(0, 30, '> RESUME <', { font: 'bold 20px Courier', fill: '#00ffff' }).setOrigin(0.5).setInteractive();
    pBtn.on('pointerdown', () => { pauseMenu.setVisible(false); STATE = 'PLAYING'; });
    pauseMenu.add([pBg, pTxt, pBtn]);

    // 2. LEVEL UP MENU
    levelUpMenu = scene.add.container(200, 350).setDepth(100).setVisible(false);
    let lBg = scene.add.rectangle(0, 0, 340, 400, 0x010111, 0.95).setStrokeStyle(2, 0x0088ff);
    let lTxt = scene.add.text(0, -150, 'SYSTEM UPGRADE', { font: 'bold 24px Courier', fill: '#0088ff' }).setOrigin(0.5);
    levelUpMenu.add([lBg, lTxt]);

    let upgrades = [
        { text: 'INCREASE BLADE RADIUS', action: () => statRadius++ },
        { text: 'INCREASE COMBO DAMAGE', action: () => statCombo += 0.5 },
        { text: 'FULL HEALTH SHIELD', action: () => { activePowerups.shield = true; player.setTint(0x00ffff); } }
    ];

    upgrades.forEach((u, i) => {
        let card = scene.add.rectangle(0, -50 + (i*80), 280, 60, 0x0a0a22).setStrokeStyle(1, 0x00ffff).setInteractive();
        let txt = scene.add.text(0, -50 + (i*80), u.text, { font: '14px Courier', fill: '#fff' }).setOrigin(0.5);
        card.on('pointerdown', () => {
            u.action();
            currentExp = 0; maxExp = Math.floor(maxExp * 1.5); 
            uiExpFill.width = 0; levelUpMenu.setVisible(false); STATE = 'PLAYING';
        });
        levelUpMenu.add([card, txt]);
    });

    // 3. GAME OVER MENU
    gameOverMenu = scene.add.container(200, 350).setDepth(100).setVisible(false);
    let gBg = scene.add.rectangle(0, 0, 340, 450, 0x110000, 0.95).setStrokeStyle(2, 0xff0055);
    let gTxt = scene.add.text(0, -180, 'SYSTEM FAILURE', { font: 'bold 24px Courier', fill: '#ff0055' }).setOrigin(0.5);
    let gStats = scene.add.text(0, -120, '', { font: '16px Courier', fill: '#fff', align:'center' }).setOrigin(0.5).setName('stats');
    gameOverMenu.add([gBg, gTxt, gStats]);

    let adBtn = scene.add.rectangle(0, -10, 280, 50, 0x221100).setStrokeStyle(1, 0xff5500).setInteractive();
    let adTxt = scene.add.text(0, -10, '🎬 WATCH AD: REVIVE', { font: 'bold 14px Courier', fill: '#ff5500' }).setOrigin(0.5);
    
    let gemBtn = scene.add.rectangle(0, 60, 280, 50, 0x220022).setStrokeStyle(1, 0xff00aa).setInteractive();
    let gemTxt = scene.add.text(0, 60, '💎 SPEND 10 GEMS: REVIVE', { font: 'bold 14px Courier', fill: '#ff00aa' }).setOrigin(0.5);

    let restartBtn = scene.add.text(0, 160, '> NEW RUN <', { font: 'bold 20px Courier', fill: '#00ffff' }).setOrigin(0.5).setInteractive();

    adBtn.on('pointerdown', () => revivePlayer(scene));
    gemBtn.on('pointerdown', () => {
        if(totalGems >= 10) { totalGems -= 10; localStorage.setItem('ninja_gems', totalGems); uiGems.setText('💎 ' + totalGems); revivePlayer(scene); }
    });
    restartBtn.on('pointerdown', () => {
        score = 0; currentExp = 0; maxExp = 5; runLevel = 1; waveDifficulty = 1; statRadius = 1; statCombo = 1; uiScore.setText('SCORE: 0'); uiExpFill.width = 0;
        enemies.clear(true, true); bullets.clear(true, true); bosses.clear(true, true); items.clear(true, true);
        player.setPosition(200, 550).setVisible(true).clearTint(); activePowerups.shield = false;
        gameOverMenu.setVisible(false); STATE = 'PLAYING';
    });

    gameOverMenu.add([adBtn, adTxt, gemBtn, gemTxt, restartBtn]);
}

function revivePlayer(scene) {
    player.setPosition(200, 550).setVisible(true);
    isInvulnerable = true; scene.time.delayedCall(2000, () => isInvulnerable = false); 
    enemies.clear(true, true); bullets.clear(true, true); 
    gameOverMenu.setVisible(false); STATE = 'PLAYING';
}
</script>
</body>
